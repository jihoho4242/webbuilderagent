name: CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruby-cli-tests:
    name: Ruby CLI tests (${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4", "4.0"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Run repository checks
        run: ruby bin/check

  engine-runtime-matrix-smoke:
    name: Engine runtime matrix smoke (Docker/Podman)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      - name: Run real Docker/Podman engine runtime matrix smoke
        shell: bash
        run: |
          set -o pipefail
          mkdir -p .ai-web/ci
          ruby bin/engine-runtime-matrix-check --json | tee .ai-web/ci/engine-runtime-matrix-smoke.json

      - name: Upload runtime matrix evidence
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: engine-runtime-matrix-smoke
          path: .ai-web/ci/engine-runtime-matrix-smoke.json
          if-no-files-found: error

  profile-d-e2e-smoke:
    name: Profile D pnpm/Playwright E2E smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"

      - name: Set up Node 24
        uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Enable pnpm through Corepack
        run: |
          corepack enable
          corepack prepare pnpm@11.0.9 --activate
          pnpm --version

      - name: Run Profile D pnpm/Playwright E2E smoke
        run: ruby bin/profile-d-e2e-smoke --output .ai-web/ci/profile-d-e2e-smoke.json

      - name: Upload Profile D E2E smoke evidence
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: profile-d-e2e-smoke
          path: .ai-web/ci/profile-d-e2e-smoke.json
          if-no-files-found: error
