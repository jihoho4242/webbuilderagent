name: CI

"on":
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruby-cli-tests:
    name: Ruby CLI tests (${{ matrix.ruby }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: ["3.3", "3.4", "4.0"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - name: Run repository checks
        run: ruby bin/check
